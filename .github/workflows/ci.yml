name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Build — Backend
  # ─────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Check for syntax errors
        run: node --check src/server.js

      - name: Validate env example exists
        run: test -f .env.example

  # ─────────────────────────────────────────────
  # Job 2: Lint & Build — Frontend
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://dsa-visualizer-api-9k8j.onrender.com/api' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Deploy summary (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy Summary
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deployment info
        run: |
          echo "════════════════════════════════════════"
          echo "✅  Backend  → Render (auto-deploy)"
          echo "✅  Frontend → Vercel (auto-deploy)"
          echo "════════════════════════════════════════"
          echo "Commit : ${{ github.sha }}"
          echo "Branch : ${{ github.ref_name }}"
          echo "Author : ${{ github.actor }}"
          echo "Live   : https://dsa-visualizer-azure.vercel.app"
